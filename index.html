:1000;font-size:18px}.labelPreview .term{text-align:center;font-size:11px;margin:1px 0 8px}.labelPreview .line{border-top:1px solid #222;margin:5px 0}.labelPreview .feeRow{display:flex;justify-content:space-between;font-size:15px;font-weight:900;line-height:1.55}.labelPreview .stats{display:flex;justify-content:space-between;font-size:11px;margin:7px 0}.labelPreview .total{text-align:center;font-size:20px;font-weight:1000;margin:5px 0}.labelPreview .sign{font-size:11px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.printSheet{display:none}.editBox{border-top:1px solid var(--line);margin-top:16px;padding-top:16px}@media print{body{background:white;padding:0}.app,.tabbar{display:none!important}.printSheet{display:grid;grid-template-columns:repeat(3,80mm);grid-auto-rows:56mm;gap:0}.printLabel{width:80mm;height:56mm;border:1px dashed #bbb;padding:4mm;overflow:hidden}.printLabel .brand{text-align:center;font-weight:900;font-size:12pt}.printLabel .term{text-align:center;font-size:7pt}.printLabel .line{border-top:1px solid #111;margin:2mm 0}.printLabel .feeRow{display:flex;justify-content:space-between;font-weight:900;font-size:9.5pt;line-height:1.35}.printLabel .stats{display:flex;justify-content:space-between;font-size:7.5pt;margin:2mm 0}.printLabel .total{text-align:center;font-weight:1000;font-size:14pt}.printLabel .sign{display:grid;grid-template-columns:1fr 1fr;gap:3mm;font-size:7.5pt;margin-top:2mm}}@media(max-width:520px){h1{font-size:39px}.grid2{grid-template-columns:1fr}.checkgrid{grid-template-columns:1fr}.card{padding:20px 16px}.dateBox{grid-template-columns:56px 1fr 56px}.circle{width:56px;height:56px}.dateMain{font-size:32px}.labelPreview{width:100%}}
</style></head><body><div class="app"><div class="version">v0.4.1 Stable Cloud<span id="cloudStatus" class="cloud">連線中</span></div><h1>小山舍與孩子</h1><div class="subtitle">雲端同步・點名・學生・學費・貼紙</div>
<section id="home" class="page active"><div class="card dateBox"><button class="circle" onclick="changeDate(-1)">‹</button><div><div class="dateMain" id="dateMain"></div><div class="dateSub" id="dateSub"></div></div><button class="circle" onclick="changeDate(1)">›</button></div><div class="row space" style="margin-bottom:18px"><button class="secondary" onclick="goToday()">今天</button><button class="ghost" onclick="openMakeup()">＋ 加入今日補課</button></div><div class="card grid4"><div class="stat"><b id="stTotal">0</b><span>今日名單</span></div><div class="stat"><b id="stPresent">0</b><span>出席</span></div><div class="stat"><b id="stLeave">0</b><span>請假</span></div><div class="stat"><b id="stMakeup">0</b><span>補課</span></div></div><div class="card"><h2 id="classTitle">固定班</h2><div id="todayList"></div></div><div class="card"><h2>今日補課</h2><div id="makeupList"></div></div></section>
<section id="students" class="page"><div class="card"><h2>新增學生</h2><div class="grid2"><div><label>姓名</label><input id="sName" placeholder="例如：王小明"></div><div><label>學生ID（自動）</label><input id="sIdPreview" disabled></div></div><label>上課日（可複選）</label><div class="checkgrid"><label class="checkitem"><input id="day2" type="checkbox" checked> 星期二</label><label class="checkitem"><input id="day3" type="checkbox"> 星期三</label><label class="checkitem"><input id="day4" type="checkbox"> 星期四</label></div><div class="grid2"><div><label>時段</label><input id="sTime" placeholder="16:30－18:30"></div><div><label>單堂費用</label><input id="sFee" type="number" placeholder="300"></div><div><label>指導老師（對內）</label><select id="sTeacher"><option>阿丹</option><option>少揚</option></select></div><div><label>學生狀態</label><select id="sStatus"><option value="active">正常上課</option><option value="paused">本期暫停</option><option value="stopped">已停課</option></select></div><div><label>共同收費</label><select id="sBillingMode" onchange="toggleCB()"><option value="single">單獨收費</option><option value="common">與兄弟姊妹共同收費</option></select></div></div><div id="cbBox" style="display:none"><label>共同收費ID</label><select id="sCBSelect"></select><button class="ghost" style="margin-top:10px" onclick="createCB()">＋ 新增共同收費ID</button></div><label>備註</label><textarea id="sNote" placeholder="調課、補課、特殊提醒"></textarea><button class="primary" style="margin-top:12px" onclick="addStudent()">新增學生</button></div><div class="card"><div class="row space"><h2>學生名單</h2><button class="ghost danger" onclick="resetAll()">清除雲端資料</button></div><div id="studentTable"></div></div></section>
<section id="fees" class="page"><div class="card"><h2>學費設定</h2><div class="grid2"><div><label>本期名稱</label><input id="termName" value="2026／7–8月學費" oninput="saveSettings()"></div><div><label>開始日期</label><input id="termStart" type="date" value="2026-07-01" onchange="saveSettings()"></div><div><label>結束日期</label><input id="termEnd" type="date" value="2026-08-31" onchange="saveSettings()"></div></div><div class="notice" style="margin-top:14px">正常上課學生會列入學費與貼紙；本期暫停／已停課不列入。</div></div><div class="card"><h2>學費試算</h2><div id="feeGroups"></div></div></section>
<section id="labels" class="page"><div class="card"><h2>貼紙列印</h2><div class="notice">尺寸 80 × 56 mm；A4 3 × 5，共 15 張。暫停與停課學生不列印。</div><div id="labelPreviewWrap" style="margin-top:18px"></div><div class="row" style="justify-content:center"><button class="primary" onclick="printLabels()">列印 A4 貼紙</button></div></div></section></div>
<nav class="tabbar"><div class="tabs"><button class="tab active" onclick="showPage('home',this)"><span class="emoji">🏠</span>首頁</button><button class="tab" onclick="showPage('students',this)"><span class="emoji">🧑‍🎨</span>學生</button><button class="tab" onclick="showPage('fees',this)"><span class="emoji">💰</span>學費</button><button class="tab" onclick="showPage('labels',this)"><span class="emoji">🏷️</span>貼紙</button></div></nav><div id="printSheet" class="printSheet"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getFirestore,doc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBycFdJvJ5K_GjIsvekjJ-esgyS8XtJ7_I",authDomain:"xiaoshan-attendance.firebaseapp.com",projectId:"xiaoshan-attendance",storageBucket:"xiaoshan-attendance.firebasestorage.app",messagingSenderId:"1083737235493",appId:"1:1083737235493:web:852864a8e33fba19861fcc"};
const app=initializeApp(firebaseConfig),db=getFirestore(app),dataRef=doc(db,"xiaoshan","main");let state=defaults(),currentDate=new Date(),cloudReady=false,saveTimer=null,editingId=null;
function defaults(){return{students:[],attendance:{},makeups:{},nextStudent:1,nextCB:1,settings:{termName:"2026／7–8月學費",termStart:"2026-07-01",termEnd:"2026-08-31"}}}function normalize(){state.students=(state.students||[]).map(s=>({...s,status:s.status||"active",days:Array.isArray(s.days)?s.days:(s.day?[s.day]:[]),prevLeave:Number(s.prevLeave||0)}));state.attendance=state.attendance||{};state.makeups=state.makeups||{};state.settings={...defaults().settings,...(state.settings||{})}}function setCloud(t,ok=false){cloudStatus.textContent=t;cloudStatus.style.background=ok?"#dff3e8":"#fff1c9";cloudStatus.style.color=ok?"#126c42":"#946200"}function persist(){if(!cloudReady)return;clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await setDoc(dataRef,{...state,updatedAt:new Date().toISOString()});setCloud("已同步",true)}catch(e){console.error(e);setCloud("同步失敗")}},250)}function save(){persist();renderAll()}onSnapshot(dataRef,snap=>{if(snap.exists()){state={...defaults(),...snap.data()};delete state.updatedAt}else{state=defaults();setDoc(dataRef,state).catch(console.error)}normalize();cloudReady=true;setCloud("雲端同步",true);renderAll()},err=>{console.error(err);setCloud("連線失敗")});
function pad(n){return String(n).padStart(2,"0")}function dateKey(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function zhDay(n){return["日","一","二","三","四","五","六"][n]}function sid(){return"S"+String(state.nextStudent||1).padStart(3,"0")}function cbid(){return"CB"+String(state.nextCB||1).padStart(3,"0")}function money(n){return"$"+Number(n||0).toLocaleString("zh-TW")}function activeStudents(){return state.students.filter(s=>(s.status||"active")==="active")}window.showPage=(id,btn)=>{document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));btn.classList.add("active");renderAll()};window.changeDate=n=>{currentDate.setDate(currentDate.getDate()+n);renderHome()};window.goToday=()=>{currentDate=new Date();renderHome()};window.saveSettings=()=>{state.settings.termName=termName.value;state.settings.termStart=termStart.value;state.settings.termEnd=termEnd.value;save()};window.toggleCB=()=>{cbBox.style.display=sBillingMode.value==="common"?"block":"none"};
function updateCBOptions(selected){const ids=[...new Set(state.students.map(s=>s.cbId).filter(Boolean))];if(selected&&!ids.includes(selected))ids.push(selected);sCBSelect.innerHTML=ids.length?ids.map(id=>`<option ${id===selected?"selected":""}>${id}</option>`).join(""):`<option>${cbid()}</option>`}window.createCB=()=>{const id=cbid();state.nextCB=(state.nextCB||1)+1;updateCBOptions(id);persist()};function chosenDays(prefix=""){const a=[];if(document.getElementById(prefix+"day2").checked)a.push(2);if(document.getElementById(prefix+"day3").checked)a.push(3);if(document.getElementById(prefix+"day4").checked)a.push(4);return a}
window.addStudent=()=>{const name=sName.value.trim();if(!name){alert("請輸入姓名");return}const days=chosenDays();if(!days.length){alert("請至少選一個上課日");return}let cbId="";if(sBillingMode.value==="common"){cbId=sCBSelect.value||cbid();if(cbId===cbid())state.nextCB=(state.nextCB||1)+1}state.students.push({id:sid(),name,days,time:sTime.value.trim(),fee:Number(sFee.value||0),teacher:sTeacher.value,status:sStatus.value,cbId,note:sNote.value.trim(),prevLeave:0});state.nextStudent=(state.nextStudent||1)+1;sName.value="";sTime.value="";sFee.value="";sNote.value="";day2.checked=true;day3.checked=false;day4.checked=false;sStatus.value="active";sBillingMode.value="single";toggleCB();save()};window.resetAll=async()=>{if(confirm("確定清除全部雲端資料？這會影響所有裝置。")){state=defaults();await setDoc(dataRef,state);renderAll()}};
function attKey(id){return dateKey(currentDate)+"_"+id}function getAtt(id){return state.attendance[attKey(id)]||"none"}window.cycleAtt=(id,type="normal")=>{const order=type==="makeup"?["makeup","none"]:["none","present","leave","makeup"];const now=getAtt(id);state.attendance[attKey(id)]=order[(order.indexOf(now)+1)%order.length]||order[0];save()};function statusText(s){return{none:"未點",present:"出席",leave:"請假",makeup:"補課"}[s]||"未點"}function studentDays(s){return Array.isArray(s.days)?s.days:(s.day?[s.day]:[])}function statusText2(s){return{active:"正常",paused:"本期暫停",stopped:"已停課"}[s.status||"active"]}
function listHTML(arr,type="normal"){if(!arr.length)return'<div class="meta" style="text-align:center;padding:28px 0;font-size:20px">沒有學生</div>';return arr.map(s=>`<div class="studentItem" onclick="cycleAtt('${s.id}','${type}')"><div><div class="name">${s.name}</div><div class="meta">${s.id}｜${s.teacher}｜${studentDays(s).map(d=>"星期"+zhDay(d)).join("、")}｜${s.time||"未填時段"}${s.cbId?"｜共同收費 "+s.cbId:""}</div></div><div class="badge ${getAtt(s.id)}">${statusText(getAtt(s.id))}</div></div>`).join("")}function renderHome(){const w=currentDate.getDay(),dk=dateKey(currentDate);dateMain.textContent=`${currentDate.getFullYear()}/${currentDate.getMonth()+1}/${currentDate.getDate()}（${zhDay(w)}）`;dateSub.textContent=dk;const fixed=activeStudents().filter(s=>studentDays(s).includes(w));const mk=(state.makeups[dk]||[]).map(id=>activeStudents().find(s=>s.id===id)).filter(Boolean);const valid=[2,3,4].includes(w);classTitle.textContent=valid?`星期${zhDay(w)}固定班`:"非固定上課日";todayList.innerHTML=valid?listHTML(fixed):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">今天不是固定上課日（二、三、四）</div>';makeupList.innerHTML=listHTML(mk,"makeup");const all=[...(valid?fixed:[]),...mk];stTotal.textContent=all.length;stPresent.textContent=all.filter(s=>getAtt(s.id)==="present").length;stLeave.textContent=all.filter(s=>getAtt(s.id)==="leave").length;stMakeup.textContent=all.filter(s=>getAtt(s.id)==="makeup").length}window.openMakeup=()=>{const dk=dateKey(currentDate),exists=new Set(state.makeups[dk]||[]),c=activeStudents().filter(s=>!exists.has(s.id));if(!c.length){alert("沒有可加入的學生");return}const ans=prompt("輸入補課學生編號：\\n\\n"+c.map((s,i)=>`${i+1}. ${s.name}｜${s.id}｜${studentDays(s).map(d=>"星期"+zhDay(d)).join("、")}`).join("\\n"));const s=c[Number(ans)-1];if(s){state.makeups[dk]=[...(state.makeups[dk]||[]),s.id];state.attendance[dk+"_"+s.id]="makeup";save()}};
function esc(str){return String(str||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}function renderStudents(){sIdPreview.value=sid();updateCBOptions();studentTable.innerHTML=state.students.length?state.students.map(s=>studentCard(s)).join(""):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">尚未新增學生</div>'}function studentCard(s){const statusClass=s.status==="paused"?"paused":s.status==="stopped"?"stopped":"";return `<div class="studentItem"><div><div class="name">${s.id} ${esc(s.name)}</div><div class="meta">${studentDays(s).map(d=>"星期"+zhDay(d)).join("、")}｜${esc(s.time)||"未填時段"}｜${s.teacher}｜${s.cbId||"單獨收費"}｜上期請假 ${s.prevLeave||0} 堂</div></div><div><div class="badge ${statusClass}">${statusText2(s)}</div><button class="ghost" style="margin-top:8px" onclick="startEdit('${s.id}')">編輯</button></div></div>${editingId===s.id?editForm(s):""}`}
function editForm(s){const cbIds=[...new Set(state.students.map(x=>x.cbId).filter(Boolean))];if(s.cbId&&!cbIds.includes(s.cbId))cbIds.push(s.cbId);const cbOptions=cbIds.length?cbIds.map(id=>`<option ${id===s.cbId?"selected":""}>${id}</option>`).join(""):`<option>${cbid()}</option>`;return `<div class="editBox"><h3>編輯 ${esc(s.name)}</h3><div class="grid2"><div><label>姓名</label><input id="eName" value="${esc(s.name)}"></div><div><label>狀態</label><select id="eStatus"><option value="active" ${s.status==="active"?"selected":""}>正常上課</option><option value="paused" ${s.status==="paused"?"selected":""}>本期暫停</option><option value="stopped" ${s.status==="stopped"?"selected":""}>已停課</option></select></div></div><label>上課日</label><div class="checkgrid"><label class="checkitem"><input id="eday2" type="checkbox" ${studentDays(s).includes(2)?"checked":""}> 星期二</label><label class="checkitem"><input id="eday3" type="checkbox" ${studentDays(s).includes(3)?"checked":""}> 星期三</label><label class="checkitem"><input id="eday4" type="checkbox" ${studentDays(s).includes(4)?"checked":""}> 星期四</label></div><div class="grid2"><div><label>時段</label><input id="eTime" value="${esc(s.time)}"></div><div><label>單堂費用</label><input id="eFee" type="number" value="${s.fee||0}"></div><div><label>老師</label><select id="eTeacher"><option ${s.teacher==="阿丹"?"selected":""}>阿丹</option><option ${s.teacher==="少揚"?"selected":""}>少揚</option></select></div><div><label>上期請假堂數</label><input id="ePrevLeave" type="number" value="${s.prevLeave||0}"></div><div><label>共同收費</label><select id="eBilling" onchange="document.getElementById('eCBBox').style.display=this.value==='common'?'block':'none'"><option value="single" ${s.cbId?"":"selected"}>單獨收費</option><option value="common" ${s.cbId?"selected":""}>共同收費</option></select></div></div><div id="eCBBox" style="display:${s.cbId?"block":"none"}"><label>共同收費ID</label><select id="eCB">${cbOptions}</select><button class="ghost" style="margin-top:10px" onclick="editNewCB()">＋ 新增共同收費ID</button></div><label>備註</label><textarea id="eNote">${esc(s.note)}</textarea><div class="row" style="margin-top:12px;flex-wrap:wrap"><button class="primary" onclick="saveEdit('${s.id}')">儲存修改</button><button class="ghost" onclick="cancelEdit()">取消</button><button class="ghost danger" onclick="deleteStudent('${s.id}')">刪除學生</button></div></div>`}window.startEdit=id=>{editingId=id;renderAll()};window.cancelEdit=()=>{editingId=null;renderAll()};window.editNewCB=()=>{const id=cbid();state.nextCB=(state.nextCB||1)+1;eCB.insertAdjacentHTML("beforeend",`<option selected>${id}</option>`);persist()};window.saveEdit=id=>{const s=state.students.find(x=>x.id===id);if(!s)return;const days=chosenDays("e");if(!days.length){alert("請至少選一個上課日");return}s.name=eName.value.trim()||s.name;s.status=eStatus.value;s.days=days;s.time=eTime.value.trim();s.fee=Number(eFee.value||0);s.teacher=eTeacher.value;s.prevLeave=Number(ePrevLeave.value||0);s.cbId=eBilling.value==="common"?(eCB.value||cbid()):"";s.note=eNote.value.trim();editingId=null;save()};window.deleteStudent=id=>{const s=state.students.find(x=>x.id===id);if(s&&confirm(`確定刪除 ${s.name}？`)){state.students=state.students.filter(x=>x.id!==id);editingId=null;save()}};
function groups(){const g={};activeStudents().forEach(s=>{const k=s.cbId||s.id;(g[k]=g[k]||[]).push(s)});return g}function countWeekdayInRange(day,startStr,endStr){if(!startStr||!endStr)return 0;let d=new Date(startStr+"T00:00:00"),end=new Date(endStr+"T00:00:00"),count=0;while(d<=end){if(d.getDay()===day)count++;d.setDate(d.getDate()+1)}return count}function lessonsForStudent(s){return studentDays(s).reduce((sum,d)=>sum+countWeekdayInRange(d,state.settings.termStart,state.settings.termEnd),0)}function calc(s){return Math.max(0,(lessonsForStudent(s)-Number(s.prevLeave||0))*Number(s.fee||0))}function renderFees(){termName.value=state.settings.termName;termStart.value=state.settings.termStart;termEnd.value=state.settings.termEnd;const e=Object.values(groups());feeGroups.innerHTML=e.length?e.map(arr=>{const total=arr.reduce((a,s)=>a+calc(s),0),prev=arr.reduce((a,s)=>a+Number(s.prevLeave||0),0),lessons=arr.reduce((a,s)=>a+lessonsForStudent(s),0);return`<div class="studentItem"><div><div class="name">${arr.length>1?"共同收費":"單獨收費"}｜${arr.map(s=>esc(s.name)).join("、")}</div><div class="meta">${arr.map(s=>`${s.id} ${lessonsForStudent(s)}堂 ${money(calc(s))}`).join("　")}｜上期請假 ${prev} 堂｜本期堂數 ${lessons} 堂</div></div><div class="badge">${money(total)}</div></div>`}).join(""):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">尚無可收費學生</div>'}function labelHTML(arr,cls="labelPreview"){const total=arr.reduce((a,s)=>a+calc(s),0),prev=arr.reduce((a,s)=>a+Number(s.prevLeave||0),0),lessons=arr.reduce((a,s)=>a+lessonsForStudent(s),0);return`<div class="${cls}"><div class="brand">小山舍與孩子</div><div class="term">${esc(state.settings.termName)}</div><div class="line"></div>${arr.map(s=>`<div class="feeRow"><span>${esc(s.name)}</span><span>${money(calc(s))}</span></div>`).join("")}<div class="line"></div><div class="stats"><span>上期請假：${prev}堂</span><span>本期堂數：${lessons}堂</span></div><div class="line"></div><div class="total">合計：${money(total)}</div><div class="sign"><span>收費日期：________</span><span>老師：________</span></div></div>`}function renderLabels(){const e=Object.values(groups());labelPreviewWrap.innerHTML=e.length?e.map(a=>labelHTML(a)).join(""):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">尚無可列印學生</div>'}window.printLabels=()=>{printSheet.innerHTML=Object.values(groups()).map(a=>labelHTML(a,"printLabel")).join("");setTimeout(()=>window.print(),50)}function renderAll(){renderHome();renderStudents();renderFees();renderLabels()}if("serviceWorker"in navigator){navigator.serviceWorker.register("./service-worker.js?v=041").catch(()=>{})}renderAll();
</script></body></html>
