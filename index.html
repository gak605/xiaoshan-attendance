<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<title>小山舍與孩子</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
:root{--bg:#f4f1ec;--card:#fffaf3;--ink:#222;--muted:#756f68;--line:#ded6cc;--accent:#1f2937;--green:#1f9d55;--yellow:#d6a400;--blue:#2563eb;--gray:#aaa;--danger:#b91c1c;--shadow:0 8px 26px rgba(0,0,0,.08);}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif;background:linear-gradient(180deg,#faf7f1,#efe7dc);color:var(--ink);min-height:100vh;padding-bottom:88px}.app{max-width:820px;margin:0 auto;padding:18px 14px 32px}.top{position:sticky;top:0;z-index:5;background:rgba(244,241,236,.92);backdrop-filter:blur(14px);padding:14px 14px 10px;margin:0 -14px 12px;border-bottom:1px solid rgba(222,214,204,.65)}h1{font-size:26px;line-height:1.1;margin:0 0 4px;font-weight:800;letter-spacing:.02em}.sub{color:var(--muted);font-size:13px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,250,243,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}.tabbar{display:flex;width:100%;max-width:820px}.tab{flex:1;border:0;background:transparent;padding:10px 3px 8px;font-size:12px;color:var(--muted);font-weight:700}.tab span{display:block;font-size:21px;margin-bottom:2px}.tab.active{color:#111}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}.row{display:flex;align-items:center;gap:10px}.between{display:flex;align-items:center;justify-content:space-between;gap:10px}.dateNav{display:flex;align-items:center;justify-content:space-between;gap:8px}.dateTitle{text-align:center;flex:1}.dateMain{font-size:20px;font-weight:800}.dateSub{font-size:13px;color:var(--muted);margin-top:2px}.btn{border:0;border-radius:14px;background:#1f2937;color:white;font-weight:800;padding:11px 14px;font-size:15px}.btn.secondary{background:#e9e1d7;color:#222}.btn.ghost{background:transparent;color:#222;border:1px solid var(--line)}.btn.danger{background:#fee2e2;color:#991b1b}.iconBtn{width:42px;height:42px;border:0;border-radius:50%;background:#e9e1d7;font-size:22px}.sectionTitle{font-size:15px;color:var(--muted);font-weight:800;margin:18px 4px 8px}.classTitle{font-size:16px;font-weight:900;margin:2px 0 10px}.studentLine{display:flex;align-items:center;gap:10px;padding:11px 2px;border-top:1px solid rgba(222,214,204,.7)}.studentLine:first-of-type{border-top:0}.status{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);font-size:18px;font-weight:900;flex:0 0 38px}.s-none{background:#eee;color:#777}.s-present{background:#dcfce7;color:var(--green);border-color:#86efac}.s-absent{background:#fef3c7;color:#a16207;border-color:#fde68a}.s-makeup{background:#dbeafe;color:var(--blue);border-color:#93c5fd}.studentInfo{flex:1;min-width:0}.name{font-size:17px;font-weight:900}.meta{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.amount{font-size:18px;font-weight:900}.pill{display:inline-flex;align-items:center;border-radius:999px;background:#eee5da;color:#51483f;padding:4px 9px;font-size:12px;font-weight:800;margin:2px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.summary .box{background:#f2eadf;border-radius:16px;padding:10px;text-align:center}.num{font-size:20px;font-weight:900}.lab{font-size:12px;color:var(--muted);font-weight:700}.form{display:grid;gap:10px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:0 0 5px 3px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;color:#111;padding:12px;font-size:16px;font-family:inherit}textarea{min-height:70px;resize:vertical}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.studentCard .between{align-items:flex-start}.smallActions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.smallBtn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:7px 10px;font-size:13px;font-weight:800}.feeGroup{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}.bigTotal{font-size:28px;font-weight:950;letter-spacing:.01em}.notice{font-size:13px;color:var(--muted);line-height:1.55}.printArea{display:grid;grid-template-columns:1fr;gap:12px}.label{background:white;border:1px dashed #999;border-radius:12px;padding:16px;min-height:210px}.labelTitle{font-size:16px;font-weight:800;color:#555;margin-bottom:8px}.labelName{font-size:26px;font-weight:950;margin:8px 0}.labelDue{font-size:28px;font-weight:950;margin:8px 0}.labelLine{border-top:1px solid #ddd;margin:10px 0}.labelMeta{font-size:14px;line-height:1.5}.signature{font-size:16px;line-height:2;margin-top:8px}.hidden{display:none!important}.empty{padding:22px;text-align:center;color:var(--muted);font-weight:700}.search{margin:8px 0 12px}.footerNote{font-size:12px;color:var(--muted);line-height:1.5;margin:10px 4px}@media print{body{background:white;padding:0}.top,.tabs,.noPrint{display:none!important}.app{max-width:none;padding:0}.card{box-shadow:none;border:0;margin:0;padding:0}.printArea{grid-template-columns:repeat(2,1fr);gap:8mm;padding:8mm}.label{break-inside:avoid;border:1px solid #333;border-radius:0;min-height:60mm;padding:6mm}.labelName{font-size:22pt}.labelDue{font-size:24pt}.labelMeta{font-size:11pt}.signature{font-size:12pt}.labelTitle{font-size:11pt}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><h1>小山舍與孩子</h1><div class="sub">v0.2 測試版｜點名・學生・學費・貼紙雛形</div></div>

  <section id="page-home">
    <div class="card dateNav noPrint">
      <button class="iconBtn" id="prevDay">‹</button>
      <div class="dateTitle"><div class="dateMain" id="dateMain"></div><div class="dateSub" id="dateSub"></div></div>
      <button class="iconBtn" id="nextDay">›</button>
    </div>
    <div class="between noPrint" style="padding:0 4px"><button class="btn secondary" id="todayBtn">今天</button><button class="btn ghost" id="addMakeupBtn">＋ 加入今日補課</button></div>
    <div class="card"><div class="summary"><div class="box"><div class="num" id="sumTotal">0</div><div class="lab">今日名單</div></div><div class="box"><div class="num" id="sumPresent">0</div><div class="lab">出席</div></div><div class="box"><div class="num" id="sumAbsent">0</div><div class="lab">請假</div></div><div class="box"><div class="num" id="sumMakeup">0</div><div class="lab">補課</div></div></div></div>
    <div id="roster"></div>
  </section>

  <section id="page-students" class="hidden">
    <div class="card noPrint"><div class="between"><div><div class="classTitle">學生管理</div><div class="notice">星期固定為二、三、四。收費袋可讓兄弟姐妹合併收費與列印貼紙。</div></div><button class="btn" id="showAddStudent">＋ 新增</button></div><input class="search" id="studentSearch" placeholder="搜尋學生" /></div>
    <div class="card hidden" id="studentFormCard"><div class="classTitle" id="formTitle">新增學生</div><div class="form">
      <input type="hidden" id="studentId" />
      <div class="field"><label>學生姓名</label><input id="studentName" placeholder="例如：王小明" /></div>
      <div class="grid2"><div class="field"><label>單堂費用</label><input id="studentFee" type="number" inputmode="numeric" placeholder="300" /></div><div class="field"><label>上期請假堂數</label><input id="studentPrevAbs" type="number" inputmode="numeric" value="0" /></div></div>
      <div class="grid2"><div class="field"><label>上課星期</label><select id="studentDay"><option value="2">星期二</option><option value="3">星期三</option><option value="4">星期四</option></select></div><div class="field"><label>上課時段</label><input id="studentTime" placeholder="16:30－18:30" /></div></div>
      <div class="field"><label>收費袋</label><select id="studentBag"></select></div>
      <div class="field"><label>備註</label><textarea id="studentNote" placeholder="可填寫調課、補課、特殊提醒"></textarea></div>
      <div class="row"><button class="btn" id="saveStudent">儲存</button><button class="btn secondary" id="cancelStudent">取消</button></div>
    </div></div>
    <div id="studentsList"></div>
  </section>

  <section id="page-fees" class="hidden">
    <div class="card noPrint"><div class="classTitle">學費</div><div class="grid2"><div class="field"><label>下一期堂數</label><select id="nextLessons"><option value="8">8堂</option><option value="9">9堂</option></select></div><div class="field"><label>顯示</label><select id="feeFilter"><option value="all">全部收費袋</option><option value="unpaid">未收</option><option value="paid">已收</option></select></div></div><div class="notice">公式：單堂費 × 下一期堂數 − 單堂費 × 上期請假堂數。兄弟姐妹會依「同一收費袋」合併。</div></div>
    <div id="feesList"></div>
  </section>

  <section id="page-labels" class="hidden">
    <div class="card noPrint"><div class="classTitle">收費袋貼紙</div><div class="notice">v0.2 先提供列印雛形：姓名與金額放大，底部保留收費日期與老師簽名。之後會再微調成正式貼紙尺寸。</div><div class="row" style="margin-top:12px"><button class="btn" onclick="window.print()">列印貼紙</button></div></div>
    <div class="printArea" id="labelsList"></div>
  </section>
</div>

<nav class="tabs noPrint"><div class="tabbar"><button class="tab active" data-page="home"><span>🏠</span>首頁</button><button class="tab" data-page="students"><span>👧</span>學生</button><button class="tab" data-page="fees"><span>💰</span>學費</button><button class="tab" data-page="labels"><span>🏷️</span>貼紙</button></div></nav>

<script>
const LS='xiaoshan_v02_data';
const statusOrder=['none','present','absent','makeup'];
const statusText={none:'未點名',present:'出席',absent:'請假',makeup:'補課'};
const statusIcon={none:'○',present:'✓',absent:'假',makeup:'補'};
const weekName=['日','一','二','三','四','五','六'];
let state=load();
let selectedDate=new Date();
function load(){try{return JSON.parse(localStorage.getItem(LS))||seed()}catch(e){return seed()}}
function save(){localStorage.setItem(LS,JSON.stringify(state));}
function seed(){return {students:[],bags:[],attendance:{},makeups:{},nextLessons:8};}
function id(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function ymd(d){const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function md(dstr){const [y,m,d]=dstr.split('-');return `${Number(m)}/${Number(d)}`}
function dateLabel(d){return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${weekName[d.getDay()]}）`}
function dayOf(d){return d.getDay()}
function studentsActive(){return state.students.filter(s=>!s.archived)}
function bagName(bagId){const members=studentsActive().filter(s=>s.bagId===bagId);return members.length? `${members[0].name} 的收費袋（${members.length}位）`:'新收費袋'}
function ensureBagForStudent(name){const bag={id:id(),paid:false,createdAt:Date.now()}; state.bags.push(bag); return bag.id;}
function getBag(idv){return state.bags.find(b=>b.id===idv)}
function attKey(date,idv){return `${date}|${idv}`}
function getAtt(date,idv){return state.attendance[attKey(date,idv)]||'none'}
function setAtt(date,idv,status){state.attendance[attKey(date,idv)]=status;save();renderAll();}
function cycleAtt(date,idv){const cur=getAtt(date,idv);const next=statusOrder[(statusOrder.indexOf(cur)+1)%statusOrder.length];setAtt(date,idv,next)}
function currency(n){return '$'+Number(n||0).toLocaleString('zh-TW')}
function calcStudent(s){const lessons=Number(state.nextLessons||8);const fee=Number(s.fee||0);const prevAbs=Number(s.prevAbs||0);return {base:fee*lessons,deduct:fee*prevAbs,due:Math.max(0,fee*lessons-fee*prevAbs),lessons,fee,prevAbs}}
function calcBag(bagId){const members=studentsActive().filter(s=>s.bagId===bagId);const rows=members.map(s=>({s,...calcStudent(s)}));return {members:rows,total:rows.reduce((a,r)=>a+r.due,0)}}
function renderHome(){document.getElementById('dateMain').textContent=dateLabel(selectedDate);document.getElementById('dateSub').textContent=ymd(selectedDate);const date=ymd(selectedDate);const dow=dayOf(selectedDate);let fixed=studentsActive().filter(s=>Number(s.day)===dow);let makeupIds=state.makeups[date]||[];let makeups=studentsActive().filter(s=>makeupIds.includes(s.id));let html='';const renderGroup=(title,list,isMakeup=false)=>{if(!list.length)return `<div class="card"><div class="classTitle">${title}</div><div class="empty">沒有學生</div></div>`;let byTime={};list.forEach(s=>{const t=s.time||'未設定時段';(byTime[t]||(byTime[t]=[])).push(s)});return Object.entries(byTime).map(([time,arr])=>`<div class="card"><div class="classTitle">${title}｜${time}</div>${arr.map(s=>{const st=isMakeup?'makeup':getAtt(date,s.id); if(isMakeup && getAtt(date,s.id)!=='makeup') state.attendance[attKey(date,s.id)]='makeup'; return `<div class="studentLine" onclick="${isMakeup?'':'cycleAtt(\''+date+'\',\''+s.id+'\')'}"><div class="status s-${st}">${statusIcon[st]}</div><div class="studentInfo"><div class="name">${s.name}${isMakeup?' <span class="pill">今日補課</span>':''}</div><div class="meta">${s.time||''}${s.note?'｜'+escapeHtml(s.note):''}</div></div><div class="meta">${statusText[st]}</div></div>`}).join('')}</div>`).join('')}
html+=renderGroup(`星期${weekName[dow]}固定班`,fixed,false);html+=renderGroup('今日補課',makeups,true);document.getElementById('roster').innerHTML=html;save();const all=[...fixed,...makeups];document.getElementById('sumTotal').textContent=all.length;document.getElementById('sumPresent').textContent=all.filter(s=>getAtt(date,s.id)==='present').length;document.getElementById('sumAbsent').textContent=all.filter(s=>getAtt(date,s.id)==='absent').length;document.getElementById('sumMakeup').textContent=all.filter(s=>getAtt(date,s.id)==='makeup').length;}
function renderStudents(){const q=(document.getElementById('studentSearch')?.value||'').trim();let list=studentsActive().filter(s=>!q||s.name.includes(q)||String(s.note||'').includes(q));document.getElementById('studentsList').innerHTML=list.length?list.map(s=>`<div class="card studentCard"><div class="between"><div><div class="name">${s.name}</div><div class="meta">星期${weekName[s.day]}｜${s.time||'未設定'}｜單堂 ${currency(s.fee)}</div><div class="meta">收費袋：${bagName(s.bagId)}</div>${s.note?`<div class="footerNote">備註：${escapeHtml(s.note)}</div>`:''}</div><div class="amount">${currency(calcStudent(s).due)}</div></div><div class="smallActions"><button class="smallBtn" onclick="editStudent('${s.id}')">編輯</button><button class="smallBtn" onclick="archiveStudent('${s.id}')">刪除</button></div></div>`).join(''):'<div class="card empty">目前沒有學生</div>';renderBagSelect();}
function renderBagSelect(){const sel=document.getElementById('studentBag');if(!sel)return;const current=sel.value;sel.innerHTML='<option value="new">建立新的收費袋</option>'+state.bags.map(b=>`<option value="${b.id}">${bagName(b.id)}</option>`).join('');if([...sel.options].some(o=>o.value===current))sel.value=current;}
function clearForm(){studentId.value='';studentName.value='';studentFee.value='';studentPrevAbs.value='0';studentDay.value='2';studentTime.value='';studentNote.value='';renderBagSelect();studentBag.value='new';formTitle.textContent='新增學生'}
function editStudent(idv){const s=state.students.find(x=>x.id===idv);if(!s)return;studentFormCard.classList.remove('hidden');studentId.value=s.id;studentName.value=s.name;studentFee.value=s.fee;studentPrevAbs.value=s.prevAbs||0;studentDay.value=s.day;studentTime.value=s.time||'';studentNote.value=s.note||'';renderBagSelect();studentBag.value=s.bagId;formTitle.textContent='編輯學生';window.scrollTo({top:0,behavior:'smooth'})}
function archiveStudent(idv){if(!confirm('確定刪除這位學生？'))return;const s=state.students.find(x=>x.id===idv);if(s){s.archived=true;save();renderAll()}}
function renderFees(){state.nextLessons=Number(document.getElementById('nextLessons').value);save();const filter=document.getElementById('feeFilter').value;let bags=state.bags.filter(b=>studentsActive().some(s=>s.bagId===b.id));if(filter==='paid')bags=bags.filter(b=>b.paid);if(filter==='unpaid')bags=bags.filter(b=>!b.paid);document.getElementById('feesList').innerHTML=bags.length?bags.map(b=>{const c=calcBag(b.id);return `<div class="card"><div class="between"><div><div class="classTitle">${bagName(b.id)}</div><div class="notice">${b.paid?'已收':'未收'}</div></div><div class="bigTotal">${currency(c.total)}</div></div><div class="feeGroup">${c.members.map(r=>`<div class="between" style="margin:8px 0"><div><b>${r.s.name}</b><div class="meta">${r.fee} × ${r.lessons} 堂 − 扣抵 ${r.deduct}</div></div><div class="amount">${currency(r.due)}</div></div>`).join('')}</div><div class="smallActions"><button class="smallBtn" onclick="togglePaid('${b.id}')">${b.paid?'改為未收':'標記已收'}</button></div></div>`}).join(''):'<div class="card empty">沒有收費資料</div>';}
function togglePaid(bagId){const b=getBag(bagId);if(b){b.paid=!b.paid;save();renderAll()}}
function renderLabels(){const bags=state.bags.filter(b=>studentsActive().some(s=>s.bagId===b.id));document.getElementById('labelsList').innerHTML=bags.length?bags.map(b=>{const c=calcBag(b.id);const multi=c.members.length>1;return `<div class="label"><div class="labelTitle">小山舍與孩子</div>${c.members.map(r=>`<div class="between"><div class="labelName">${r.s.name}</div><div class="labelDue">${currency(r.due)}</div></div><div class="labelMeta">星期${weekName[r.s.day]}｜${r.s.time||''}<br>下一期 ${r.lessons} 堂｜單堂 ${r.fee}｜扣抵 ${currency(r.deduct)}</div>`).join('<div class="labelLine"></div>')}${multi?`<div class="labelLine"></div><div class="between"><div class="labelName">合計</div><div class="labelDue">${currency(c.total)}</div></div>`:''}<div class="labelLine"></div><div class="signature">收費日期：_____________<br>老師簽名：_____________</div></div>`}).join(''):'<div class="card empty noPrint">沒有貼紙資料</div>';}
function addMakeup(){const date=ymd(selectedDate);const fixed=studentsActive().filter(s=>Number(s.day)===dayOf(selectedDate)).map(s=>s.id);const candidates=studentsActive().filter(s=>!fixed.includes(s.id)&&!(state.makeups[date]||[]).includes(s.id));if(!candidates.length){alert('目前沒有可加入的補課學生');return}const name=prompt('輸入要加入今日補課的學生姓名關鍵字：');if(!name)return;const found=candidates.filter(s=>s.name.includes(name));if(!found.length){alert('找不到學生');return}let s=found[0];if(found.length>1){const msg=found.map((x,i)=>`${i+1}. ${x.name}（星期${weekName[x.day]}）`).join('\n');const n=Number(prompt('找到多位學生，請輸入編號：\n'+msg));s=found[n-1];if(!s)return}state.makeups[date]=state.makeups[date]||[];state.makeups[date].push(s.id);state.attendance[attKey(date,s.id)]='makeup';save();renderAll();}
function escapeHtml(t){return String(t).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function renderAll(){renderHome();renderStudents();renderFees();renderLabels();}
prevDay.onclick=()=>{selectedDate.setDate(selectedDate.getDate()-1);renderAll()};nextDay.onclick=()=>{selectedDate.setDate(selectedDate.getDate()+1);renderAll()};todayBtn.onclick=()=>{selectedDate=new Date();renderAll()};addMakeupBtn.onclick=addMakeup;
showAddStudent.onclick=()=>{clearForm();studentFormCard.classList.remove('hidden')};cancelStudent.onclick=()=>{studentFormCard.classList.add('hidden');clearForm()};saveStudent.onclick=()=>{const name=studentName.value.trim();if(!name){alert('請輸入學生姓名');return}let sid=studentId.value;let bagId=studentBag.value;if(bagId==='new')bagId=ensureBagForStudent(name);const data={name,fee:Number(studentFee.value||0),prevAbs:Number(studentPrevAbs.value||0),day:Number(studentDay.value),time:studentTime.value.trim(),note:studentNote.value.trim(),bagId,archived:false};if(sid){const idx=state.students.findIndex(s=>s.id===sid);state.students[idx]={...state.students[idx],...data}}else{state.students.push({id:id(),...data})}save();studentFormCard.classList.add('hidden');clearForm();renderAll()};studentSearch.oninput=renderStudents;nextLessons.onchange=renderAll;feeFilter.onchange=renderFees;
document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['home','students','fees','labels'].forEach(p=>document.getElementById('page-'+p).classList.toggle('hidden',p!==btn.dataset.page));renderAll();});
if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}
renderAll();
</script>
</body>
</html>
