<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>小山舍與孩子 v0.3.3</title>
<link rel="manifest" href="manifest.webmanifest?v=033">
<link rel="apple-touch-icon" href="icon-192.png?v=033">
<meta name="theme-color" content="#f7f1e7">
<style>
:root{--bg:#f7f1e7;--card:#fffaf2;--ink:#1f292d;--muted:#81796f;--line:#ddd2c4;--chip:#eee6dc;--accent:#1f292d;--blue:#2f80ed;--shadow:0 14px 35px rgba(32,27,18,.08);--r:28px}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",Arial,sans-serif}body{padding:env(safe-area-inset-top) 0 calc(88px + env(safe-area-inset-bottom))}button,input,select,textarea{font:inherit}button{border:0}.app{max-width:900px;margin:0 auto;padding:24px 18px 0}.version{font-weight:900;color:var(--muted);font-size:16px}h1{font-size:42px;line-height:1.04;margin:10px 0 2px;font-weight:1000;letter-spacing:-1.5px}.subtitle{font-size:20px;color:var(--muted);font-weight:800;margin-bottom:28px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}.row{display:flex;gap:12px;align-items:center}.space{justify-content:space-between}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}label{display:block;font-weight:900;color:var(--muted);margin:14px 0 8px;font-size:16px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;background:#fffdf8;padding:15px 16px;color:var(--ink);outline:none}textarea{min-height:112px;resize:vertical}.primary{background:var(--accent);color:white;border-radius:16px;padding:15px 22px;font-weight:1000}.secondary{background:var(--chip);color:var(--ink);border-radius:16px;padding:14px 18px;font-weight:1000}.ghost{background:transparent;border:1px solid var(--line);border-radius:16px;padding:12px 16px;font-weight:900;color:var(--ink)}.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,250,242,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:10}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:min(900px,100%)}.tab{padding:8px 6px;border-radius:18px;text-align:center;font-weight:1000;color:var(--muted);background:transparent}.tab.active{background:var(--chip);color:var(--ink)}.tab .emoji{display:block;font-size:26px;margin-bottom:2px}.page{display:none}.page.active{display:block}.dateBox{display:grid;grid-template-columns:64px 1fr 64px;align-items:center;text-align:center}.circle{width:64px;height:64px;border-radius:50%;background:var(--chip);color:var(--blue);font-size:36px;font-weight:900}.dateMain{font-size:34px;font-weight:1000}.dateSub{font-size:17px;color:var(--muted);font-weight:800;margin-top:4px}.stat{background:var(--chip);border-radius:20px;text-align:center;padding:16px 6px}.stat b{font-size:30px}.stat span{display:block;color:var(--muted);font-weight:900}.studentItem{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}.studentItem:last-child{border-bottom:0}.name{font-size:20px;font-weight:1000}.meta{color:var(--muted);font-weight:800;font-size:14px;margin-top:3px}.badge{border-radius:999px;padding:8px 12px;font-weight:1000;white-space:nowrap;background:var(--chip)}.badge.present{background:#dff3e8;color:#157347}.badge.leave{background:#fff1c9;color:#946200}.badge.makeup{background:#d9ecff;color:#1f6ecb}.badge.none{background:var(--chip);color:var(--muted)}.table{width:100%;border-collapse:collapse;font-size:14px}.table th,.table td{border-bottom:1px solid var(--line);padding:10px 6px;text-align:left}.table th{color:var(--muted);font-weight:1000}.notice{background:#fff5d8;border:1px solid #ead7a2;color:#705100;border-radius:18px;padding:14px 16px;font-weight:900}.checkgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.checkitem{background:#fffdf8;border:1px solid var(--line);border-radius:16px;padding:14px 16px;font-weight:900}.checkitem input{width:auto;margin-right:8px}.labelPreview{background:white;color:#111;border:1px dashed #777;width:320px;aspect-ratio:80/56;padding:16px;margin:0 auto 12px;font-family:"Noto Sans TC",Arial,sans-serif}.labelPreview .brand{text-align:center;font-weight:1000;font-size:18px}.labelPreview .term{text-align:center;font-size:11px;margin:1px 0 8px}.labelPreview .line{border-top:1px solid #222;margin:5px 0}.labelPreview .feeRow{display:flex;justify-content:space-between;font-size:15px;font-weight:900;line-height:1.55}.labelPreview .stats{display:flex;justify-content:space-between;font-size:11px;margin:7px 0}.labelPreview .total{text-align:center;font-size:20px;font-weight:1000;margin:5px 0}.labelPreview .sign{font-size:11px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}.printSheet{display:none}@media print{body{background:white;padding:0}.app,.tabbar{display:none!important}.printSheet{display:grid;grid-template-columns:repeat(3,80mm);grid-auto-rows:56mm;gap:0}.printLabel{width:80mm;height:56mm;border:1px dashed #bbb;padding:4mm;font-family:"Noto Sans TC",Arial,sans-serif;overflow:hidden}.printLabel .brand{text-align:center;font-weight:900;font-size:12pt}.printLabel .term{text-align:center;font-size:7pt}.printLabel .line{border-top:1px solid #111;margin:2mm 0}.printLabel .feeRow{display:flex;justify-content:space-between;font-weight:900;font-size:9.5pt;line-height:1.35}.printLabel .stats{display:flex;justify-content:space-between;font-size:7.5pt;margin:2mm 0}.printLabel .total{text-align:center;font-weight:1000;font-size:14pt}.printLabel .sign{display:grid;grid-template-columns:1fr 1fr;gap:3mm;font-size:7.5pt;margin-top:2mm}}@media(max-width:520px){h1{font-size:39px}.grid2{grid-template-columns:1fr}.checkgrid{grid-template-columns:1fr}.card{padding:20px 16px}.dateBox{grid-template-columns:56px 1fr 56px}.circle{width:56px;height:56px}.dateMain{font-size:32px}.labelPreview{width:100%}}
</style>
</head>
<body>
<div class="app">
<div class="version">v0.3.3 測試版</div><h1>小山舍與孩子</h1><div class="subtitle">點名・學生・學費・貼紙雛形</div>
<section id="home" class="page active">
<div class="card dateBox"><button class="circle" onclick="changeDate(-1)">‹</button><div><div class="dateMain" id="dateMain"></div><div class="dateSub" id="dateSub"></div></div><button class="circle" onclick="changeDate(1)">›</button></div>
<div class="row space" style="margin-bottom:18px"><button class="secondary" onclick="goToday()">今天</button><button class="ghost" onclick="openMakeup()">＋ 加入今日補課</button></div>
<div class="card grid4"><div class="stat"><b id="stTotal">0</b><span>今日名單</span></div><div class="stat"><b id="stPresent">0</b><span>出席</span></div><div class="stat"><b id="stLeave">0</b><span>請假</span></div><div class="stat"><b id="stMakeup">0</b><span>補課</span></div></div>
<div class="card"><h2 id="classTitle">固定班</h2><div id="todayList"></div></div><div class="card"><h2>今日補課</h2><div id="makeupList"></div></div>
</section>
<section id="students" class="page">
<div class="card"><h2>新增學生</h2><div class="grid2"><div><label>姓名</label><input id="sName" placeholder="例如：王小明"></div><div><label>學生ID（自動）</label><input id="sIdPreview" disabled></div></div>
<label>上課日（可複選）</label><div class="checkgrid"><label class="checkitem"><input id="day2" type="checkbox" checked> 星期二</label><label class="checkitem"><input id="day3" type="checkbox"> 星期三</label><label class="checkitem"><input id="day4" type="checkbox"> 星期四</label></div>
<div class="grid2"><div><label>時段</label><input id="sTime" placeholder="16:30－18:30"></div><div><label>單堂費用</label><input id="sFee" type="number" placeholder="300"></div><div><label>指導老師（對內）</label><select id="sTeacher"><option>阿丹</option><option>少揚</option></select></div><div><label>共同收費</label><select id="sBillingMode" onchange="toggleCB()"><option value="single">單獨收費</option><option value="common">與兄弟姊妹共同收費</option></select></div></div>
<div id="cbBox" style="display:none"><label>共同收費ID</label><select id="sCBSelect"></select><button class="ghost" style="margin-top:10px" onclick="createCB()">＋ 新增共同收費ID</button><div class="meta">同一家庭使用同一個 CB 編號；貼紙不會顯示此編號。</div></div>
<label>備註</label><textarea id="sNote" placeholder="調課、補課、特殊提醒"></textarea><button class="primary" style="margin-top:12px" onclick="addStudent()">新增學生</button></div>
<div class="card"><div class="row space"><h2>學生名單</h2><button class="ghost" onclick="resetAll()">清除測試資料</button></div><div id="studentTable"></div></div>
</section>
<section id="fees" class="page"><div class="card"><h2>學費設定</h2><div class="grid2"><div><label>本期名稱</label><input id="termName" value="2026／7–8月學費" oninput="saveSettings()"></div><div><label>開始日期</label><input id="termStart" type="date" value="2026-07-01" onchange="saveSettings()"></div><div><label>結束日期</label><input id="termEnd" type="date" value="2026-08-31" onchange="saveSettings()"></div></div><div class="notice" style="margin-top:14px">本期堂數由日期區間自動計算。星期二、三、四堂數會因大小月不同而不同；一週兩堂會自動加總。</div></div><div class="card"><h2>學費試算</h2><div id="feeGroups"></div></div></section>
<section id="labels" class="page"><div class="card"><h2>貼紙列印</h2><div class="notice">尺寸 80 × 56 mm；A4 3 × 5，共 15 張。貼紙不顯示共同收費ID與老師資訊。</div><div id="labelPreviewWrap" style="margin-top:18px"></div><div class="row" style="justify-content:center"><button class="primary" onclick="printLabels()">列印 A4 貼紙</button></div></div></section>
</div>
<nav class="tabbar"><div class="tabs"><button class="tab active" onclick="showPage('home',this)"><span class="emoji">🏠</span>首頁</button><button class="tab" onclick="showPage('students',this)"><span class="emoji">🧑‍🎨</span>學生</button><button class="tab" onclick="showPage('fees',this)"><span class="emoji">💰</span>學費</button><button class="tab" onclick="showPage('labels',this)"><span class="emoji">🏷️</span>貼紙</button></div></nav>
<div id="printSheet" class="printSheet"></div>
<script>
const KEY='xiaoshan_v033_data';let state=loadState();let currentDate=new Date();
function defaults(){return{students:[],attendance:{},makeups:{},nextStudent:1,nextCB:1,settings:{termName:'2026／7–8月學費',termStart:'2026-07-01',termEnd:'2026-08-31'}}}
function loadState(){try{return JSON.parse(localStorage.getItem(KEY))||defaults()}catch(e){return defaults()}}function persist(){localStorage.setItem(KEY,JSON.stringify(state))}
function save(){persist();renderAll()}function pad(n){return String(n).padStart(2,'0')}function dateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function zhDay(n){return ['日','一','二','三','四','五','六'][n]}function sid(){return 'S'+String(state.nextStudent).padStart(3,'0')}function cbid(){return 'CB'+String(state.nextCB).padStart(3,'0')}function money(n){return '$'+Number(n||0).toLocaleString('zh-TW')}
function showPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderAll()}function changeDate(n){currentDate.setDate(currentDate.getDate()+n);renderHome()}function goToday(){currentDate=new Date();renderHome()}
function saveSettings(){state.settings.termName=termName.value;state.settings.termStart=termStart.value;state.settings.termEnd=termEnd.value;save()}function toggleCB(){cbBox.style.display=sBillingMode.value==='common'?'block':'none'}function updateCBOptions(selected){const ids=[...new Set(state.students.map(s=>s.cbId).filter(Boolean))];if(selected&&!ids.includes(selected))ids.push(selected);sCBSelect.innerHTML=ids.length?ids.map(id=>`<option ${id===selected?'selected':''}>${id}</option>`).join(''):`<option>${cbid()}</option>`}function createCB(){const id=cbid();state.nextCB++;updateCBOptions(id);persist()}
function chosenDays(){const days=[];if(day2.checked)days.push(2);if(day3.checked)days.push(3);if(day4.checked)days.push(4);return days}
function addStudent(){const name=sName.value.trim();if(!name){alert('請輸入姓名');return}const days=chosenDays();if(!days.length){alert('請至少選一個上課日');return}let cbId='';if(sBillingMode.value==='common'){cbId=sCBSelect.value||cbid();if(cbId===cbid())state.nextCB++}state.students.push({id:sid(),name,days,time:sTime.value.trim(),fee:Number(sFee.value||0),teacher:sTeacher.value,cbId,note:sNote.value.trim(),prevLeave:0});state.nextStudent++;sName.value='';sTime.value='';sFee.value='';sNote.value='';day2.checked=true;day3.checked=false;day4.checked=false;sBillingMode.value='single';toggleCB();save()}
function resetAll(){if(confirm('清除全部測試資料？')){state=defaults();save()}}function attKey(id){return dateKey(currentDate)+'_'+id}function getAtt(id){return state.attendance[attKey(id)]||'none'}function cycleAtt(id,type='normal'){const order=type==='makeup'?['makeup','none']:['none','present','leave','makeup'];const now=getAtt(id);state.attendance[attKey(id)]=order[(order.indexOf(now)+1)%order.length]||order[0];save()}function statusText(s){return{none:'未點',present:'出席',leave:'請假',makeup:'補課'}[s]||'未點'}
function studentDays(s){return Array.isArray(s.days)?s.days:(s.day?[s.day]:[])}
function listHTML(arr,type='normal'){if(!arr.length)return'<div class="meta" style="text-align:center;padding:28px 0;font-size:20px">沒有學生</div>';return arr.map(s=>`<div class="studentItem" onclick="cycleAtt('${s.id}','${type}')"><div><div class="name">${s.name}</div><div class="meta">${s.id}｜${s.teacher}｜${studentDays(s).map(d=>'星期'+zhDay(d)).join('、')}｜${s.time||'未填時段'}${s.cbId?'｜共同收費 '+s.cbId:''}</div></div><div class="badge ${getAtt(s.id)}">${statusText(getAtt(s.id))}</div></div>`).join('')}
function renderHome(){const w=currentDate.getDay(),dk=dateKey(currentDate);dateMain.textContent=`${currentDate.getFullYear()}/${currentDate.getMonth()+1}/${currentDate.getDate()}（${zhDay(w)}）`;dateSub.textContent=dk;const fixed=state.students.filter(s=>studentDays(s).includes(w));const mk=(state.makeups[dk]||[]).map(id=>state.students.find(s=>s.id===id)).filter(Boolean);const valid=[2,3,4].includes(w);classTitle.textContent=valid?`星期${zhDay(w)}固定班`:'非固定上課日';todayList.innerHTML=valid?listHTML(fixed):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">今天不是固定上課日（二、三、四）</div>';makeupList.innerHTML=listHTML(mk,'makeup');const all=[...(valid?fixed:[]),...mk];stTotal.textContent=all.length;stPresent.textContent=all.filter(s=>getAtt(s.id)==='present').length;stLeave.textContent=all.filter(s=>getAtt(s.id)==='leave').length;stMakeup.textContent=all.filter(s=>getAtt(s.id)==='makeup').length}
function openMakeup(){const dk=dateKey(currentDate),exists=new Set(state.makeups[dk]||[]);const c=state.students.filter(s=>!exists.has(s.id));if(!c.length){alert('沒有可加入的學生');return}const ans=prompt('輸入補課學生編號：\\n\\n'+c.map((s,i)=>`${i+1}. ${s.name}｜${s.id}｜${studentDays(s).map(d=>'星期'+zhDay(d)).join('、')}`).join('\\n'));const s=c[Number(ans)-1];if(s){state.makeups[dk]=[...(state.makeups[dk]||[]),s.id];state.attendance[dk+'_'+s.id]='makeup';save()}}
function renderStudents(){sIdPreview.value=sid();updateCBOptions();studentTable.innerHTML=state.students.length?`<table class="table"><thead><tr><th>ID</th><th>姓名</th><th>上課日</th><th>費用</th><th>老師</th><th>共同收費</th><th>上期請假</th></tr></thead><tbody>${state.students.map(s=>`<tr><td>${s.id}</td><td>${s.name}</td><td>${studentDays(s).map(zhDay).join('、')}</td><td>${money(s.fee)}</td><td>${s.teacher}</td><td>${s.cbId||'單獨'}</td><td><input style="width:70px;padding:8px" type="number" value="${s.prevLeave||0}" onchange="setPrevLeave('${s.id}',this.value)">堂</td></tr>`).join('')}</tbody></table>`:'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">尚未新增學生</div>'}
function setPrevLeave(id,v){const s=state.students.find(x=>x.id===id);if(s){s.prevLeave=Number(v||0);persist();renderFees();renderLabels()}}function groups(){const g={};state.students.forEach(s=>{const k=s.cbId||s.id;(g[k]=g[k]||[]).push(s)});return g}
function countWeekdayInRange(day,startStr,endStr){if(!startStr||!endStr)return 0;let d=new Date(startStr+'T00:00:00'),end=new Date(endStr+'T00:00:00'),count=0;while(d<=end){if(d.getDay()===day)count++;d.setDate(d.getDate()+1)}return count}
function lessonsForStudent(s){return studentDays(s).reduce((sum,d)=>sum+countWeekdayInRange(d,state.settings.termStart,state.settings.termEnd),0)}
function calc(s){return Math.max(0,(lessonsForStudent(s)-Number(s.prevLeave||0))*Number(s.fee||0))}
function renderFees(){termName.value=state.settings.termName;termStart.value=state.settings.termStart;termEnd.value=state.settings.termEnd;const e=Object.values(groups());feeGroups.innerHTML=e.length?e.map(arr=>{const total=arr.reduce((a,s)=>a+calc(s),0),prev=arr.reduce((a,s)=>a+Number(s.prevLeave||0),0),lessons=arr.reduce((a,s)=>a+lessonsForStudent(s),0);return`<div class="studentItem"><div><div class="name">${arr.length>1?'共同收費':'單獨收費'}｜${arr.map(s=>s.name).join('、')}</div><div class="meta">${arr.map(s=>`${s.id} ${lessonsForStudent(s)}堂 ${money(calc(s))}`).join('　')}｜上期請假 ${prev} 堂｜本期堂數 ${lessons} 堂</div></div><div class="badge">${money(total)}</div></div>`}).join(''):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">尚未新增學生</div>'}
function labelHTML(arr,cls='labelPreview'){const total=arr.reduce((a,s)=>a+calc(s),0),prev=arr.reduce((a,s)=>a+Number(s.prevLeave||0),0),lessons=arr.reduce((a,s)=>a+lessonsForStudent(s),0);return`<div class="${cls}"><div class="brand">小山舍與孩子</div><div class="term">${state.settings.termName}</div><div class="line"></div>${arr.map(s=>`<div class="feeRow"><span>${s.name}</span><span>${money(calc(s))}</span></div>`).join('')}<div class="line"></div><div class="stats"><span>上期請假：${prev}堂</span><span>本期堂數：${lessons}堂</span></div><div class="line"></div><div class="total">合計：${money(total)}</div><div class="sign"><span>收費日期：________</span><span>老師：________</span></div></div>`}
function renderLabels(){const e=Object.values(groups());labelPreviewWrap.innerHTML=e.length?e.map(a=>labelHTML(a)).join(''):'<div class="meta" style="text-align:center;padding:32px 0;font-size:20px">尚未新增學生</div>'}function printLabels(){printSheet.innerHTML=Object.values(groups()).map(a=>labelHTML(a,'printLabel')).join('');setTimeout(()=>window.print(),50)}
function renderAll(){renderHome();renderStudents();renderFees();renderLabels()}if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js?v=033').catch(()=>{})}renderAll();
</script>
</body></html>
