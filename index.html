<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="小山舍與孩子點名系統" />
  <meta name="theme-color" content="#111827" />
  <title>小山舍與孩子點名系統</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--bg:#0b0d12;--card:#171a22;--card2:#202432;--text:#f8fafc;--muted:#9ca3af;--line:#2c3242;--accent:#d8e87d;--green:#38d39f;--yellow:#f4c95d;--blue:#65a7ff;--red:#ff6b7a;--radius:24px;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#090b10,#111827);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Noto Sans TC",sans-serif;min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
    button,input,select,textarea{font:inherit} button{border:0;color:inherit;cursor:pointer} .app{max-width:520px;margin:auto;min-height:100vh;padding:18px 16px 92px}.top{display:flex;align-items:center;justify-content:space-between;margin:6px 0 18px}.brand .sub{color:var(--muted);font-size:13px}.brand h1{font-size:24px;margin:2px 0 0;line-height:1.18}.pill{background:rgba(216,232,125,.13);color:var(--accent);border:1px solid rgba(216,232,125,.25);padding:8px 12px;border-radius:999px;font-weight:700;font-size:13px}.card{background:rgba(23,26,34,.92);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:12px 0;box-shadow:0 12px 35px rgba(0,0,0,.25)}.section-title{display:flex;align-items:end;justify-content:space-between;margin:22px 2px 10px}.section-title h2{font-size:20px;margin:0}.hint{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;align-items:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:flex;flex-direction:column;gap:6px;margin:10px 0}.field label{color:var(--muted);font-size:13px}.field input,.field select,.field textarea{width:100%;background:#0d111a;border:1px solid var(--line);border-radius:14px;color:var(--text);padding:12px;outline:none}.field textarea{min-height:72px;resize:vertical}.primary{background:var(--accent);color:#111827;border-radius:16px;padding:13px 16px;font-weight:800;width:100%}.secondary{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px 14px;font-weight:700}.danger{background:rgba(255,107,122,.12);color:var(--red);border:1px solid rgba(255,107,122,.22)}.student{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 0;border-top:1px solid var(--line)}.student:first-child{border-top:0}.name{font-size:17px;font-weight:800}.meta{font-size:13px;color:var(--muted);margin-top:4px}.status{min-width:76px;text-align:center;border-radius:999px;padding:8px 10px;font-weight:800;font-size:13px;background:#263044;color:var(--muted)}.status.present{background:rgba(56,211,159,.14);color:var(--green)}.status.leave{background:rgba(244,201,93,.14);color:var(--yellow)}.status.makeup{background:rgba(101,167,255,.14);color:var(--blue)}.status.absent{background:rgba(255,107,122,.14);color:var(--red)}.money{font-size:34px;font-weight:900;letter-spacing:-1px}.calc{display:grid;grid-template-columns:1fr auto;gap:8px;color:var(--muted);font-size:14px}.calc b{color:var(--text)}.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;background:rgba(13,17,26,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.tab{background:transparent;border-radius:16px;padding:8px 4px;color:var(--muted);font-size:12px;font-weight:700}.tab.active{background:rgba(216,232,125,.13);color:var(--accent)}.tab span{display:block;font-size:20px;margin-bottom:2px}.view{display:none}.view.active{display:block}.empty{color:var(--muted);text-align:center;padding:34px 12px}.toolbar{display:flex;gap:8px;margin:10px 0}.toolbar input{flex:1;background:#0d111a;border:1px solid var(--line);color:var(--text);border-radius:16px;padding:12px}.mini{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}.sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:10}.sheet.show{display:flex}.panel{width:100%;max-width:520px;margin:auto;background:#111827;border:1px solid var(--line);border-radius:28px 28px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto}.panel h3{margin:0 0 8px;font-size:22px}.smallbtn{padding:8px 10px;border-radius:12px;background:#252b3b;color:var(--text);font-size:13px;font-weight:700}.paid{background:rgba(56,211,159,.14);color:var(--green)}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand"><div class="sub" id="todayText"></div><h1>小山舍與孩子<br>點名系統</h1></div><div class="pill" id="countPill">0 位學生</div></div>

  <main id="home" class="view active">
    <div class="section-title"><h2>今天課程</h2><span class="hint">點一下切換狀態</span></div>
    <div id="todayClasses"></div>
    <div class="card"><div class="row" style="justify-content:space-between"><div><div class="hint">今日點名</div><div class="money" id="todayDone">0/0</div></div><button class="secondary" onclick="resetToday()">重設今天</button></div></div>
  </main>

  <main id="students" class="view">
    <div class="section-title"><h2>學生管理</h2><button class="smallbtn" onclick="openStudent()">＋ 新增</button></div>
    <div class="toolbar"><input id="search" placeholder="搜尋學生" oninput="renderStudents()"><button class="secondary" onclick="seedDemo()">範例</button></div>
    <div id="studentList" class="card"></div>
  </main>

  <main id="fees" class="view">
    <div class="section-title"><h2>收費計算</h2><span class="hint">依上期請假扣抵</span></div>
    <div id="feeList"></div>
  </main>

  <main id="settings" class="view">
    <div class="section-title"><h2>設定與備份</h2></div>
    <div class="card">
      <div class="grid"><div class="field"><label>下一期名稱</label><input id="periodName" placeholder="例如：九、十月"></div><div class="field"><label>下一期堂數</label><select id="nextSessions"><option value="8">8 堂</option><option value="9">9 堂</option></select></div></div>
      <button class="primary" onclick="saveSettings()">儲存設定</button>
      <div class="mini">公式：應收 = 單堂費用 × 下一期堂數 − 單堂費用 × 上期請假堂數</div>
    </div>
    <div class="card"><button class="secondary" style="width:100%" onclick="exportData()">匯出 JSON 備份</button><br><br><button class="secondary" style="width:100%" onclick="exportCSV()">匯出 CSV 收費表</button><br><br><button class="secondary danger" style="width:100%" onclick="clearAll()">清除全部資料</button></div>
  </main>
</div>

<nav class="tabs">
  <button class="tab active" onclick="go('home',this)"><span>🏠</span>首頁</button>
  <button class="tab" onclick="go('students',this)"><span>👦</span>學生</button>
  <button class="tab" onclick="go('fees',this)"><span>💰</span>收費</button>
  <button class="tab" onclick="go('settings',this)"><span>⚙️</span>設定</button>
</nav>

<div class="sheet" id="sheet" onclick="if(event.target.id==='sheet')closeSheet()"><div class="panel"><h3 id="formTitle">新增學生</h3><input type="hidden" id="sid"><div class="field"><label>學生姓名</label><input id="sname"></div><div class="grid"><div class="field"><label>單堂費用</label><input id="sfee" type="number" inputmode="numeric" value="300"></div><div class="field"><label>上期請假堂數</label><input id="sleave" type="number" inputmode="numeric" value="0"></div></div><div class="grid"><div class="field"><label>上課星期</label><select id="sday"><option>星期一</option><option>星期二</option><option>星期三</option><option>星期四</option><option>星期五</option><option>星期六</option><option>星期日</option></select></div><div class="field"><label>上課時段</label><input id="stime" placeholder="16:30-18:30"></div></div><div class="field"><label>備註</label><textarea id="snote"></textarea></div><div class="field"><label>狀態</label><select id="sactive"><option value="1">上課中</option><option value="0">停課</option></select></div><button class="primary" onclick="saveStudent()">儲存學生</button><br><br><button class="secondary" style="width:100%" onclick="closeSheet()">取消</button><br><br><button id="deleteBtn" class="secondary danger" style="width:100%;display:none" onclick="deleteStudent()">刪除學生</button></div></div>

<script>
const $=id=>document.getElementById(id);const state={students:[],attendance:{},settings:{periodName:'下一期',nextSessions:8}};const key='xskids-attendance-v1';
function load(){Object.assign(state,JSON.parse(localStorage.getItem(key)||'{}'));state.students??=[];state.attendance??={};state.settings??={periodName:'下一期',nextSessions:8};$('periodName').value=state.settings.periodName;$('nextSessions').value=state.settings.nextSessions;renderAll()}function persist(){localStorage.setItem(key,JSON.stringify(state));renderAll()}
function todayKey(){return new Date().toISOString().slice(0,10)}function zhDay(){return ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][new Date().getDay()]}function todayLabel(){const d=new Date();return `${d.getMonth()+1}/${d.getDate()}｜${zhDay()}`}function fmt(n){return Number(n||0).toLocaleString('zh-TW')}
function go(id,el){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderAll()}
function renderAll(){$('todayText').textContent=todayLabel();$('countPill').textContent=`${state.students.filter(s=>s.active!==false).length} 位學生`;renderToday();renderStudents();renderFees()}
const cycle=['','present','leave','makeup','absent'];const labels={'':'未點','present':'出席','leave':'請假','makeup':'補課','absent':'缺席'};
function setStatus(id){let k=todayKey();state.attendance[k]??={};let cur=state.attendance[k][id]||'';state.attendance[k][id]=cycle[(cycle.indexOf(cur)+1)%cycle.length];persist()}
function renderToday(){const day=zhDay();const list=state.students.filter(s=>s.active!==false&&s.day===day).sort((a,b)=>(a.time||'').localeCompare(b.time||''));const box=$('todayClasses');if(!list.length){box.innerHTML='<div class="card empty">今天沒有排定課程。可到「學生」新增學生並設定星期。</div>';$('todayDone').textContent='0/0';return}let groups={};list.forEach(s=>{groups[s.time||'未設定時段']??=[];groups[s.time||'未設定時段'].push(s)});let k=todayKey();let done=list.filter(s=>state.attendance[k]?.[s.id]).length;$('todayDone').textContent=`${done}/${list.length}`;box.innerHTML=Object.entries(groups).map(([time,arr])=>`<div class="card"><div class="row" style="justify-content:space-between;margin-bottom:8px"><b>${time}</b><span class="hint">${arr.length} 位</span></div>${arr.map(s=>{let st=state.attendance[k]?.[s.id]||'';return `<div class="student" onclick="setStatus('${s.id}')"><div><div class="name">${esc(s.name)}</div><div class="meta">單堂 ${fmt(s.fee)}｜上期請假 ${s.leave||0} 堂</div></div><div class="status ${st}">${labels[st]}</div></div>`}).join('')}</div>`).join('')}
function renderStudents(){const q=($('search')?.value||'').trim();let list=state.students.filter(s=>!q||s.name.includes(q));const box=$('studentList');if(!list.length){box.innerHTML='<div class="empty">尚未新增學生</div>';return}box.innerHTML=list.map(s=>`<div class="student"><div onclick="openStudent('${s.id}')" style="flex:1"><div class="name">${esc(s.name)}</div><div class="meta">${s.day||''} ${s.time||''}｜單堂 ${fmt(s.fee)}｜${s.active===false?'停課':'上課中'}</div></div><button class="smallbtn" onclick="openStudent('${s.id}')">編輯</button></div>`).join('')}
function renderFees(){const box=$('feeList');let list=state.students.filter(s=>s.active!==false);if(!list.length){box.innerHTML='<div class="card empty">尚未新增學生</div>';return}box.innerHTML=list.map(s=>{const sessions=Number(state.settings.nextSessions||8),fee=Number(s.fee||0),leave=Number(s.leave||0),gross=fee*sessions,discount=fee*leave,total=Math.max(0,gross-discount);return `<div class="card"><div class="row" style="justify-content:space-between"><div><div class="name">${esc(s.name)}</div><div class="meta">${state.settings.periodName}｜${sessions} 堂</div></div><button class="smallbtn ${s.paid?'paid':''}" onclick="togglePaid('${s.id}')">${s.paid?'已收':'未收'}</button></div><div class="money">$${fmt(total)}</div><div class="calc"><span>原收</span><b>${fmt(fee)} × ${sessions} = ${fmt(gross)}</b><span>扣抵</span><b>${fmt(fee)} × ${leave} = -${fmt(discount)}</b></div></div>`}).join('')}
function openStudent(id){const s=state.students.find(x=>x.id===id);$('formTitle').textContent=s?'編輯學生':'新增學生';$('deleteBtn').style.display=s?'block':'none';$('sid').value=s?.id||'';$('sname').value=s?.name||'';$('sfee').value=s?.fee||300;$('sleave').value=s?.leave||0;$('sday').value=s?.day||'星期三';$('stime').value=s?.time||'16:30-18:30';$('snote').value=s?.note||'';$('sactive').value=s?.active===false?'0':'1';$('sheet').classList.add('show')}
function closeSheet(){$('sheet').classList.remove('show')}function saveStudent(){let id=$('sid').value||crypto.randomUUID();let data={id,name:$('sname').value.trim(),fee:Number($('sfee').value||0),leave:Number($('sleave').value||0),day:$('sday').value,time:$('stime').value.trim(),note:$('snote').value.trim(),active:$('sactive').value==='1',paid:false};if(!data.name)return alert('請輸入學生姓名');let i=state.students.findIndex(s=>s.id===id);if(i>=0)state.students[i]={...state.students[i],...data};else state.students.push(data);closeSheet();persist()}function deleteStudent(){let id=$('sid').value;if(confirm('確定刪除這位學生？')){state.students=state.students.filter(s=>s.id!==id);closeSheet();persist()}}
function togglePaid(id){let s=state.students.find(x=>x.id===id);s.paid=!s.paid;persist()}function saveSettings(){state.settings.periodName=$('periodName').value||'下一期';state.settings.nextSessions=Number($('nextSessions').value||8);persist()}function resetToday(){if(confirm('重設今天全部點名狀態？')){delete state.attendance[todayKey()];persist()}}function seedDemo(){if(!confirm('加入範例學生？'))return;state.students.push({id:crypto.randomUUID(),name:'A學生',fee:300,leave:0,day:zhDay(),time:'16:30-18:30',active:true,paid:false},{id:crypto.randomUUID(),name:'B學生',fee:350,leave:2,day:zhDay(),time:'18:30-20:30',active:true,paid:false});persist()}
function exportData(){download('xiaoshan-attendance-backup.json',JSON.stringify(state,null,2),'application/json')}function exportCSV(){let rows=[['姓名','單堂費用','下一期堂數','上期請假堂數','應收','已收']];state.students.forEach(s=>{let total=Math.max(0,Number(s.fee||0)*state.settings.nextSessions-Number(s.fee||0)*Number(s.leave||0));rows.push([s.name,s.fee,state.settings.nextSessions,s.leave,total,s.paid?'已收':'未收'])});download('小山舍與孩子收費表.csv',rows.map(r=>r.join(',')).join('\n'),'text/csv')}function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click()}function clearAll(){if(confirm('確定清除全部資料？')){localStorage.removeItem(key);location.reload()}}function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});load();
</script>
</body></html>
