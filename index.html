<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="小山舍與孩子"/>
<meta name="theme-color" content="#f5efe4"/>
<link rel="manifest" href="manifest.webmanifest?v=03"/>
<link rel="apple-touch-icon" href="icon-192.png?v=03"/>
<title>小山舍與孩子 v0.3</title>
<style>
:root{
 --bg:#f5efe4; --card:#fffaf2; --ink:#1f2528; --muted:#7e7469; --line:#e1d8cc;
 --green:#7b8b45; --yellow:#c99b34; --blue:#4b82c6; --red:#d83338; --shadow:0 10px 26px rgba(37,31,24,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:linear-gradient(#fbf7ef,#efe7db);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif;color:var(--ink);padding-bottom:98px}
header{padding:58px 22px 18px}
small{color:var(--muted);font-weight:700}
h1{font-size:36px;line-height:1.05;margin:8px 0 4px;font-weight:900;letter-spacing:-1px}
.sub{color:var(--muted);font-size:15px;font-weight:700}
main{padding:0 16px 24px;max-width:860px;margin:auto}
.card{background:rgba(255,250,242,.9);border:1px solid var(--line);border-radius:28px;padding:20px;margin:14px 0;box-shadow:var(--shadow)}
.datebar{display:flex;align-items:center;justify-content:space-between;gap:14px;text-align:center}
.circle{width:66px;height:66px;border-radius:50%;border:0;background:#ece5dc;color:#3782d9;font-size:34px;font-weight:800}
.dateText{font-size:30px;font-weight:900}.dateISO{font-size:16px;color:var(--muted);font-weight:700;margin-top:4px}
.row{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fffaf2;border-radius:18px;padding:14px 18px;font-size:18px;font-weight:900;color:var(--ink)}
.btn.primary{background:#1f2528;color:white;border-color:#1f2528}.btn.soft{background:#ece5dc}.btn.danger{background:#fff2f2;color:#bd3030}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#efe7dd;border-radius:18px;text-align:center;padding:14px 6px}.stat b{display:block;font-size:26px}.stat span{font-size:13px;color:var(--muted);font-weight:900}
h2{font-size:26px;margin:0 0 16px}h3{font-size:22px;margin:0 0 12px}
.empty{text-align:center;color:var(--muted);font-size:20px;font-weight:800;padding:28px 10px}
.studentItem{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-top:1px solid var(--line)}
.studentItem:first-child{border-top:0}.name{font-size:22px;font-weight:900}.meta{font-size:14px;color:var(--muted);font-weight:700;margin-top:3px}.note{font-size:13px;color:#8a5b2e;margin-top:6px}
.statusBtn{min-width:92px;border:0;border-radius:18px;padding:13px 8px;font-size:16px;font-weight:900;color:#fff}
.status-none{background:#b8b0a6;color:#2f2a25}.status-present{background:var(--green)}.status-leave{background:var(--yellow)}.status-makeup{background:var(--blue)}.status-done{background:#d7d0c5;color:#71685d}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,250,242,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 10px calc(8px + env(safe-area-inset-bottom));z-index:20;backdrop-filter:blur(12px)}
.tab{border:0;background:transparent;padding:8px 2px;border-radius:18px;color:var(--muted);font-weight:900;font-size:13px}.tab.active{background:#ece5dc;color:#1f2528}.tab .emoji{font-size:25px;display:block}
.page{display:none}.page.active{display:block}
label{display:block;font-size:14px;color:var(--muted);font-weight:900;margin:14px 0 7px}
input,select,textarea{width:100%;border:1px solid var(--line);background:#fffdf8;border-radius:16px;padding:14px;font-size:17px;color:var(--ink)}
textarea{min-height:84px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.studentCard{padding:16px;border:1px solid var(--line);border-radius:22px;background:#fffdf8;margin:12px 0}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.smallbtn{font-size:14px;padding:9px 12px;border-radius:12px}
.money{font-size:30px;font-weight:1000;color:#17212a}
.familyBlock{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
.printArea{background:#fff;padding:14px;color:#111;border-radius:10px}
.labelCard{break-inside:avoid;border:1.5px solid #111;padding:14px;margin:0 0 12px;width:100%;font-family:"Noto Sans TC","PingFang TC",sans-serif}
.labelName{font-size:24px;font-weight:900;display:flex;justify-content:space-between;gap:8px}.labelDue{font-size:28px;font-weight:1000;margin:8px 0}.labelLine{border-top:1px solid #333;margin:10px 0}.labelSmall{font-size:14px;line-height:1.6}.signature{font-size:15px;margin-top:12px}
@media print{
 body{background:white;padding:0}.tabs,header,.noprint,.page:not(#page-stickers){display:none!important}
 main{padding:0}.card{box-shadow:none;border:0;padding:0;margin:0}.printArea{display:grid;grid-template-columns:repeat(2,1fr);gap:8mm}.labelCard{margin:0;height:62mm}
}
</style>
</head>
<body>
<header>
  <small id="version">v0.3 測試版</small>
  <h1>小山舍與孩子</h1>
  <div class="sub">點名・學生・學費・貼紙雛形</div>
</header>
<main>
<section id="page-home" class="page active">
 <div class="card datebar">
   <button class="circle" onclick="moveDate(-1)">‹</button>
   <div><div class="dateText" id="dateText"></div><div class="dateISO" id="dateISO"></div></div>
   <button class="circle" onclick="moveDate(1)">›</button>
 </div>
 <div class="row noprint">
   <button class="btn soft" onclick="goToday()">今天</button>
   <button class="btn" onclick="openMakeupDialog()">＋ 加入今日補課</button>
 </div>
 <div class="card stats">
   <div class="stat"><b id="stTotal">0</b><span>今日名單</span></div>
   <div class="stat"><b id="stPresent">0</b><span>出席</span></div>
   <div class="stat"><b id="stLeave">0</b><span>請假</span></div>
   <div class="stat"><b id="stMakeup">0</b><span>補課</span></div>
 </div>
 <div class="card"><h2 id="classTitle">固定班</h2><div id="fixedList"></div></div>
 <div class="card"><h2>今日補課</h2><div id="makeupList"></div></div>
</section>

<section id="page-students" class="page">
 <div class="card">
   <h2>新增學生</h2>
   <label>姓名</label><input id="sName" placeholder="例如：王小明">
   <div class="grid2"><div><label>星期</label><select id="sWeek"><option value="2">星期二</option><option value="3">星期三</option><option value="4">星期四</option></select></div>
   <div><label>時段</label><input id="sTime" placeholder="16:30－18:30"></div></div>
   <div class="grid2"><div><label>單堂費用</label><input id="sFee" type="number" placeholder="300"></div>
   <div><label>指導老師（對內）</label><select id="sTeacher"><option>阿丹</option><option>少揚</option></select></div></div>
   <label>收費袋 / 收費群組</label><input id="sFamily" placeholder="例如：王小明收費袋、林家A">
   <label>備註</label><textarea id="sNote" placeholder="調課、補課、特殊提醒"></textarea>
   <button class="btn primary" onclick="addStudent()">新增學生</button>
 </div>
 <div class="card">
   <h2>學生名單</h2>
   <div class="row"><select id="teacherFilter" onchange="renderStudents()"><option value="">全部老師</option><option>阿丹</option><option>少揚</option></select></div>
   <div id="studentList"></div>
 </div>
</section>

<section id="page-fees" class="page">
 <div class="card">
   <h2>學費試算</h2>
   <div class="grid2"><div><label>下一期堂數</label><input id="nextLessons" type="number" value="8" onchange="renderFees()"></div>
   <div><label>本期請假扣抵堂數</label><input id="leaveDeduct" type="number" value="0" onchange="renderFees()"></div></div>
   <p class="sub">目前為 v0.3 初步試算；完整出缺席自動統計會放在後續版本。</p>
   <div id="feeList"></div>
 </div>
</section>

<section id="page-stickers" class="page">
 <div class="card noprint">
   <h2>貼紙列印雛形</h2>
   <p class="sub">學生姓名與金額放大；老師資訊不會出現在貼紙。</p>
   <button class="btn primary" onclick="window.print()">列印貼紙</button>
 </div>
 <div class="card"><div class="printArea" id="stickerList"></div></div>
</section>
</main>
<nav class="tabs">
 <button class="tab active" onclick="showPage('home',this)"><span class="emoji">🏠</span>首頁</button>
 <button class="tab" onclick="showPage('students',this)"><span class="emoji">🧑‍🎨</span>學生</button>
 <button class="tab" onclick="showPage('fees',this)"><span class="emoji">💰</span>學費</button>
 <button class="tab" onclick="showPage('stickers',this)"><span class="emoji">🏷️</span>貼紙</button>
</nav>
<script>
const KEY='xiaoshan_v03_data';
const statusMap={
 none:{label:'未點名', cls:'status-none'},
 present:{label:'出席', cls:'status-present'},
 leave:{label:'請假', cls:'status-leave'},
 makeup:{label:'補課', cls:'status-makeup'}
};
const order=['none','present','leave','makeup'];
let data=load();
let current = new Date();
function ymd(d){return d.toISOString().slice(0,10)}
function localYMD(d){const x=new Date(d.getTime()-d.getTimezoneOffset()*60000); return x.toISOString().slice(0,10)}
function weekZh(w){return ['日','一','二','三','四','五','六'][w]}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{students:[],att:{},makeups:{}}}catch(e){return{students:[],att:{},makeups:{}}}}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function showPage(name,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderAll()}
function moveDate(n){current.setDate(current.getDate()+n);renderHome()}
function goToday(){current=new Date();renderHome()}
function addStudent(){let name=sName.value.trim(); if(!name)return alert('請輸入姓名');
 data.students.push({id:crypto.randomUUID?crypto.randomUUID():Date.now()+''+Math.random(),name,week:+sWeek.value,time:sTime.value.trim(),fee:+sFee.value||0,teacher:sTeacher.value,family:sFamily.value.trim()||name+'收費袋',note:sNote.value.trim()});
 save(); sName.value=sTime.value=sFee.value=sFamily.value=sNote.value=''; renderAll(); alert('已新增學生');}
function delStudent(id){if(confirm('確定刪除這位學生？')){data.students=data.students.filter(s=>s.id!==id); save(); renderAll()}}
function renderStudents(){let f=document.getElementById('teacherFilter')?.value||''; let list=data.students.filter(s=>!f||s.teacher===f);
 studentList.innerHTML=list.length?list.map(s=>`<div class="studentCard"><div class="name">${s.name}</div><div class="meta">星期${weekZh(s.week)}｜${s.time||'未填時段'}｜$${s.fee||0}｜${s.teacher||'阿丹'}｜${s.family||'未分組'}</div>${s.note?`<div class="note">備註：${s.note}</div>`:''}<div class="actions"><button class="btn smallbtn danger" onclick="delStudent('${s.id}')">刪除</button></div></div>`).join(''):'<div class="empty">尚未新增學生</div>';
}
function attKey(date,id){return localYMD(date)+'_'+id}
function getAtt(date,id){return data.att[attKey(date,id)]||'none'}
function cycleAtt(date,id,force){let k=attKey(date,id); let now=data.att[k]||'none'; let next=force || order[(order.indexOf(now)+1)%order.length]; data.att[k]=next; save(); renderHome()}
function todayMakeups(date){return data.makeups[localYMD(date)]||[]}
function openMakeupDialog(){let q=prompt('輸入要加入今日補課的學生姓名關鍵字'); if(!q)return; let found=data.students.filter(s=>s.name.includes(q)); if(!found.length)return alert('找不到學生'); let s=found[0]; if(found.length>1){let names=found.map((x,i)=>`${i+1}. ${x.name}（星期${weekZh(x.week)}）`).join('\n'); let idx=+(prompt('找到多位學生，請輸入編號：\n'+names)||1)-1; s=found[idx]||found[0];}
 let key=localYMD(current); data.makeups[key]=data.makeups[key]||[]; if(!data.makeups[key].includes(s.id))data.makeups[key].push(s.id); data.att[attKey(current,s.id)]='makeup'; save(); renderHome();}
function studentRow(s,date,doneText){if(doneText)return `<div class="studentItem"><div><div class="name">${s.name}</div><div class="meta">${doneText}｜${s.teacher||''}</div></div><button class="statusBtn status-done">已補課</button></div>`;
 let st=getAtt(date,s.id), info=statusMap[st]; return `<div class="studentItem"><div><div class="name">${s.name}</div><div class="meta">${s.time||'未填時段'}｜${s.teacher||'阿丹'}｜${s.family||'未分組'}</div>${s.note?`<div class="note">${s.note}</div>`:''}</div><button class="statusBtn ${info.cls}" onclick="cycleAtt(current,'${s.id}')">${info.label}</button></div>`}
function renderHome(){let d=current, w=d.getDay(), iso=localYMD(d); dateText.textContent=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${weekZh(w)}）`; dateISO.textContent=iso;
 let isClass=[2,3,4].includes(w); classTitle.textContent=isClass?`星期${weekZh(w)}固定班`:'非固定上課日';
 let fixed=isClass?data.students.filter(s=>s.week===w):[];
 // future: check made-up original date; v0.3 just lists fixed.
 fixedList.innerHTML=fixed.length?fixed.map(s=>studentRow(s,d)).join(''):`<div class="empty">${isClass?'沒有學生':'今天不是固定上課日（二、三、四）'}</div>`;
 let mids=todayMakeups(d); let makeupStudents=mids.map(id=>data.students.find(s=>s.id===id)).filter(Boolean);
 makeupList.innerHTML=makeupStudents.length?makeupStudents.map(s=>studentRow(s,d)).join(''):'<div class="empty">沒有補課學生</div>';
 let all=[...fixed,...makeupStudents]; stTotal.textContent=all.length; stPresent.textContent=all.filter(s=>getAtt(d,s.id)==='present').length; stLeave.textContent=all.filter(s=>getAtt(d,s.id)==='leave').length; stMakeup.textContent=all.filter(s=>getAtt(d,s.id)==='makeup').length;
}
function groupByFamily(){let g={}; data.students.forEach(s=>{let k=s.family||s.name+'收費袋'; (g[k]=g[k]||[]).push(s)}); return g}
function renderFees(){let lessons=+nextLessons.value||0, deduct=+leaveDeduct.value||0; let groups=groupByFamily(); feeList.innerHTML=Object.entries(groups).map(([fam,students])=>{let rows=students.map(s=>{let due=Math.max(0,(lessons-deduct)*(+s.fee||0));return `<div class="studentItem"><div><div class="name">${s.name}</div><div class="meta">${lessons}堂 × $${s.fee||0}－扣${deduct}堂｜${s.teacher||''}</div></div><div class="money">$${due}</div></div>`}).join(''); let total=students.reduce((sum,s)=>sum+Math.max(0,(lessons-deduct)*(+s.fee||0)),0); return `<div class="familyBlock"><h3>${fam}</h3>${rows}<div class="studentItem"><div class="name">合計</div><div class="money">$${total}</div></div></div>`}).join('')||'<div class="empty">尚無學生</div>'}
function renderStickers(){let lessons=+nextLessons.value||8, deduct=+leaveDeduct.value||0; let groups=groupByFamily(); stickerList.innerHTML=Object.entries(groups).map(([fam,students])=>{let total=0; let rows=students.map(s=>{let due=Math.max(0,(lessons-deduct)*(+s.fee||0)); total+=due; return `<div class="labelName"><span>${s.name}</span><span>$${due}</span></div><div class="labelSmall">星期${weekZh(s.week)}｜${s.time||''}｜單堂 $${s.fee||0}</div>`}).join('<div class="labelLine"></div>'); return `<div class="labelCard">${rows}<div class="labelLine"></div><div class="labelDue">合計　$${total}</div><div class="labelSmall">下期 ${lessons} 堂｜扣抵 ${deduct} 堂</div><div class="labelLine"></div><div class="signature">收費日期：_____________</div><div class="signature">老師簽名：_____________</div></div>`}).join('')||'<div class="empty">尚無貼紙資料</div>'}
function renderAll(){renderHome();renderStudents();renderFees();renderStickers()}
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js?v=03').catch(()=>{})}
renderAll();
</script>
</body>
</html>
